<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A client-side application to view GitHub user profiles, including public repository count and account creation date.">
    <title>GitHub User Profile Viewer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='0' y='14'%3E💻%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #343a40;
            --border-color: #dee2e6;
            --error-color: #dc3545;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --font-family: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: #ffffff;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        header h1 {
            margin: 0;
            font-size: 2em;
        }

        main {
            flex-grow: 1;
            padding: 2rem;
            max-width: 800px;
            margin: 2rem auto;
            width: 100%;
            box-sizing: border-box;
        }

        .input-section {
            background-color: var(--card-background);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--shadow-color);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-start;
        }

        .input-section label {
            font-weight: 600;
            color: var(--text-color);
            font-size: 1.1em;
            margin-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            width: 100%;
            gap: 0.5rem;
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        #username-input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1em;
            color: var(--text-color);
            box-shadow: inset 0 1px 2px var(--shadow-color);
            min-width: 150px; /* Ensure input is not too small */
        }

        #username-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        #fetch-button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease;
        }

        #fetch-button:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        #fetch-button:active {
            transform: translateY(0);
        }

        .profile-card {
            background-color: var(--card-background);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--shadow-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        #avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            object-fit: cover;
            margin-bottom: 1rem;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        #profile-name {
            font-size: 1.8em;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        #profile-login {
            font-size: 1.2em;
            color: var(--secondary-color);
            margin-bottom: 1rem;
        }

        .profile-card p {
            margin: 0.25rem 0;
            font-size: 1.1em;
        }

        .profile-card p span {
            font-weight: 600;
            color: var(--text-color);
        }

        #profile-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--secondary-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s ease-in-out;
            font-weight: 600;
        }

        #profile-link:hover {
            background-color: #5a6268;
        }

        .error {
            color: var(--error-color);
            margin-top: 1rem;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        footer {
            margin-top: auto;
            background-color: var(--text-color);
            color: #ffffff;
            text-align: center;
            padding: 1rem 0;
            font-size: 0.9em;
            box-shadow: 0 -2px 4px var(--shadow-color);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5em;
            }

            main {
                padding: 1rem;
                margin: 1rem auto;
            }

            .input-section, .profile-card {
                padding: 1rem;
            }

            .input-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            #fetch-button {
                width: 100%;
            }

            #avatar {
                width: 90px;
                height: 90px;
            }

            #profile-name {
                font-size: 1.5em;
            }

            .profile-card p, #profile-login {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>GitHub User Profile Viewer</h1>
    </header>
    <main>
        <section class="input-section">
            <label for="username-input">Enter GitHub Username:</label>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="e.g., octocat" aria-label="GitHub username input">
                <button id="fetch-button">Get Info</button>
            </div>
            <p id="error-message" class="error hidden" aria-live="polite"></p>
        </section>

        <section id="profile-display" class="profile-card hidden" aria-live="polite">
            <img id="avatar" src="" alt="User avatar" class="hidden">
            <h2 id="profile-name"></h2>
            <p id="profile-login" class="hidden"></p>
            <p>Public Repositories: <span id="public-repos"></span></p>
            <p>Account Created: <span id="created-at"></span></p>
            <a id="profile-link" href="#" target="_blank" rel="noopener noreferrer" class="hidden">View Profile on GitHub</a>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="current-year"></span> GitHub User Info App</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('username-input');
            const fetchButton = document.getElementById('fetch-button');
            const errorMessage = document.getElementById('error-message');
            const profileDisplay = document.getElementById('profile-display');
            const avatarImg = document.getElementById('avatar');
            const profileName = document.getElementById('profile-name');
            const profileLogin = document.getElementById('profile-login');
            const publicReposSpan = document.getElementById('public-repos');
            const createdAtSpan = document.getElementById('created-at');
            const profileLink = document.getElementById('profile-link');
            const currentYearSpan = document.getElementById('current-year');

            currentYearSpan.textContent = new Date().getFullYear();

            const clearProfileDisplay = () => {
                profileDisplay.classList.add('hidden');
                avatarImg.classList.add('hidden');
                profileLogin.classList.add('hidden');
                profileLink.classList.add('hidden');
                errorMessage.classList.add('hidden');

                avatarImg.src = '';
                avatarImg.alt = 'User avatar';
                profileName.textContent = '';
                profileLogin.textContent = '';
                publicReposSpan.textContent = '';
                createdAtSpan.textContent = '';
                profileLink.href = '#';
                errorMessage.textContent = '';
            };

            const displayError = (message) => {
                clearProfileDisplay();
                errorMessage.textContent = message;
                errorMessage.classList.remove('hidden');
            };

            const fetchGitHubUser = async () => {
                const username = usernameInput.value.trim();
                clearProfileDisplay();

                if (!username) {
                    displayError('Please enter a GitHub username.');
                    return;
                }

                const githubApiUrl = `https://api.github.com/users/${username}`;

                try {
                    const response = await fetch(githubApiUrl);
                    if (!response.ok) {
                        if (response.status === 404) {
                            displayError(`User "${username}" not found. Please check the username.`);
                        } else if (response.status === 403) {
                             displayError('Rate limit exceeded for GitHub API. Please try again in an hour.');
                        }
                        else {
                            displayError(`Error fetching data: ${response.status} ${response.statusText}`);
                        }
                        return;
                    }

                    const userData = await response.json();

                    avatarImg.src = userData.avatar_url;
                    avatarImg.alt = `Avatar of ${userData.login}`;
                    avatarImg.classList.remove('hidden');

                    profileName.textContent = userData.name || userData.login;
                    if (userData.name && userData.name !== userData.login) {
                        profileLogin.textContent = `(${userData.login})`;
                        profileLogin.classList.remove('hidden');
                    } else if (!userData.name) {
                        profileLogin.textContent = userData.login; // If name is null, display login plainly
                        profileLogin.classList.remove('hidden');
                    }


                    publicReposSpan.textContent = userData.public_repos;

                    const createdAtDate = new Date(userData.created_at);
                    createdAtSpan.textContent = createdAtDate.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    profileLink.href = userData.html_url;
                    profileLink.classList.remove('hidden');

                    profileDisplay.classList.remove('hidden');

                } catch (error) {
                    console.error('Network or parsing error:', error);
                    displayError('Network error. Please check your internet connection and try again.');
                }
            };

            fetchButton.addEventListener('click', fetchGitHubUser);
            usernameInput.addEventListener('keypress', (event) => {
                if (event.key === 'Enter') {
                    fetchGitHubUser();
                }
            });
        });
    </script>
</body>
</html>
